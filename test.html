<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabadora Nativa JS</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        .controls { margin-bottom: 20px; }
        button { padding: 10px 20px; cursor: pointer; margin: 0 5px; }
        #status { color: red; font-weight: bold; margin-bottom: 10px; visibility: hidden; }
    </style>
</head>
<body>

    <h2>Grabadora de Voz</h2>
    
    <div id="status">🔴 Grabando...</div>

    <div class="controls">
        <button id="btnIniciar">Iniciar Grabación</button>
        <button id="btnDetener" disabled>Detener</button>
    </div>

    <h3>Última grabación:</h3>
    <audio id="reproductor" controls></audio>

    <script>
        let mediaRecorder;
        let audioChunks = [];

        const btnIniciar = document.getElementById('btnIniciar');
        const btnDetener = document.getElementById('btnDetener');
        const status = document.getElementById('status');
        const reproductor = document.getElementById('reproductor');

        btnIniciar.onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            
            mediaRecorder.ondataavailable = (event) => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const audioUrl = URL.createObjectURL(audioBlob);
                reproductor.src = audioUrl;
                audioChunks = [];
            };

            mediaRecorder.start();
            btnIniciar.disabled = true;
            btnDetener.disabled = false;
            status.style.visibility = 'visible';
        };

        btnDetener.onclick = () => {
            mediaRecorder.stop();
            btnIniciar.disabled = false;
            btnDetener.disabled = true;
            status.style.visibility = 'hidden';
        };
    </script>
</body>
</html>

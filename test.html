<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Test Speech API</title>

<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>

<style>
body {
    font-family: sans-serif;
    padding: 20px;
    background: #f4f4f9;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #007bff;
    color: white;
    font-weight: bold;
}

#log {
    margin-top: 15px;
    background: #111;
    color: #00ff00;
    padding: 10px;
    font-family: monospace;
    height: 150px;
    overflow-y: auto;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="card">
    <h3>Prueba SpeechRecognition</h3>

    <button onclick="checkAPI()">🔍 Probar API</button>
    <button onclick="startSpeech()">🎤 Iniciar voz</button>

    <div id="log"></div>
</div>

<script>
const log = document.getElementById("log");

function print(msg) {
    log.innerHTML += `<div>${msg}</div>`;
    log.scrollTop = log.scrollHeight;
    console.log(msg);
}

// 1. Probar si existe API
function checkAPI() {
    print("webkitSpeechRecognition: " + typeof window.webkitSpeechRecognition);
}

// 2. Speech recognition
let recognition;

function startSpeech() {

    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        print("❌ NO soportado en este navegador");
        return;
    }

    recognition = new SpeechRecognition();

    recognition.lang = "es-ES";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
        print("🎤 Escuchando...");
    };

    recognition.onresult = (e) => {
        const text = e.results[0][0].transcript;
        print("📝 " + text);
    };

    recognition.onerror = (e) => {
        print("❌ Error: " + e.error);
    };

    recognition.onend = () => {
        print("⛔ terminado");
    };

    try {
        recognition.start();
    } catch (e) {
        print("Error start: " + e.message);
    }
}

print("Sistema listo");
</script>

</body>
</html>

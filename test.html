<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Grabador y Transcriptor</title>
    <!-- 1. Consola flotante para móvil (Eruda) -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { 
            width: 100%; padding: 15px; margin: 10px 0; border: none; 
            border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold;
        }
        #startBtn { background: #28a745; color: white; }
        #stopBtn { background: #dc3545; color: white; }
        #log { 
            background: #222; color: #00ff00; padding: 10px; 
            font-family: monospace; font-size: 12px; border-radius: 5px;
            height: 100px; overflow-y: auto; margin-top: 10px;
        }
        textarea { width: 100%; height: 150px; margin-top: 10px; border: 1px solid #ccc; border-radius: 5px; padding: 10px; box-sizing: border-box; }
        .label { font-size: 12px; color: #666; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Transcriptor & Debug</h3>
        
        <div class="label">Estado del sistema:</div>
        <div id="log">Esperando interacción...</div>

        <button id="startBtn">🎤 INICIAR TRANSCRIPCIÓN</button>
        <button id="stopBtn" disabled>🛑 DETENER</button>

        <div class="label">Texto reconocido:</div>
        <textarea id="resultText" placeholder="Aquí aparecerá lo que digas..."></textarea>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resultText = document.getElementById('resultText');
        const logElement = document.getElementById('log');

        // Función para escribir logs en la pantalla del celular
        function customLog(msg, isError = false) {
            const time = new Date().toLocaleTimeString();
            const color = isError ? 'red' : '#00ff00';
            logElement.innerHTML += `<div style="color:${color}">[${time}] ${msg}</div>`;
            logElement.scrollTop = logElement.scrollHeight;
            console.log(msg);
        }

        // Captura errores globales
        window.onerror = (m) => customLog("Global Error: " + m, true);
        window.onunhandledrejection = (e) => customLog("Promise Error: " + e.reason, true);

        // Configuración de la API
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            customLog("API no soportada en este navegador", true);
            startBtn.disabled = true;
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = navigator.language || 'es-ES';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                customLog("Micro activado. ¡Habla ahora!");
            };

            recognition.onresult = (event) => {
                let current = "";
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    current += event.results[i][0].transcript;
                }
                resultText.value = current;
            };

            recognition.onerror = (event) => {
                customLog("Error de API: " + event.error, true);
                if (event.error === 'not-allowed') {
                    customLog("CONSEJO: Verifica que estés en HTTPS y que el permiso no esté bloqueado.", true);
                }
            };

            recognition.onend = () => {
                customLog("Reconocimiento finalizado.");
                startBtn.disabled = false;
                stopBtn.disabled = true;
            };

            startBtn.onclick = () => {
                try {
                    recognition.start();
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    resultText.value = "";
                } catch (e) {
                    customLog("Error al iniciar: " + e.message, true);
                }
            };

            stopBtn.onclick = () => {
                recognition.stop();
            };
        }

        customLog("Sistema listo. Navegador: " + navigator.userAgent.substring(0, 30) + "...");
        if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
            customLog("ADVERTENCIA: No estás en HTTPS. Es probable que falle.", true);
        }
    </script>
</body>
</html>

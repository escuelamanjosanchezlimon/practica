<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabador y Transcriptor JS</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 30px; background-color: #f0f2f5; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; transition: 0.3s; margin: 10px; }
        #btnEscuchar { background-color: #4CAF50; color: white; }
        #btnEscuchar:disabled { background-color: #ccc; }
        #btnDetener { background-color: #f44336; color: white; }
        #textoFinal { width: 100%; height: 150px; margin-top: 20px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; resize: none; font-size: 1.1rem; }
        .status { font-weight: bold; color: #555; margin: 10px 0; }
        .badge { background: #007bff; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Transcriptor en Tiempo Real</h2>
        <p>Idioma detectado: <span class="badge" id="langBadge">Detectando...</span></p>
        
        <div class="status" id="estado">Presiona el botón para hablar</div>

        <button id="btnEscuchar">🎤 Empezar a hablar</button>
        <button id="btnDetener" disabled>🛑 Detener</button>

        <textarea id="textoFinal" placeholder="Tu texto aparecerá aquí..."></textarea>
    </div>

    <script>
        const btnEscuchar = document.getElementById('btnEscuchar');
        const btnDetener = document.getElementById('btnDetener');
        const textoFinal = document.getElementById('textoFinal');
        const estado = document.getElementById('estado');
        const langBadge = document.getElementById('langBadge');

        // 1. Detectar idioma del navegador
        const userLang = navigator.language || 'es-ES';
        langBadge.innerText = userLang;

        // 2. Verificar soporte de SpeechRecognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            estado.innerText = "❌ Tu navegador no soporta transcripción.";
            btnEscuchar.disabled = true;
        } else {
            const recognition = new SpeechRecognition();
            
            // Configuración
            recognition.lang = userLang;
            recognition.continuous = true; // No para hasta que tú digas
            recognition.interimResults = true; // Muestra resultados parciales

            // Evento cuando hay resultados
            recognition.onresult = (event) => {
                let textoAcumulado = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    textoAcumulado += event.results[i][0].transcript;
                }
                textoFinal.value = textoAcumulado;
            };

            recognition.onstart = () => {
                estado.innerText = "Listening... (Escuchando)";
                estado.style.color = "red";
            };

            recognition.onend = () => {
                estado.innerText = "Transcripción finalizada.";
                estado.style.color = "#555";
                btnEscuchar.disabled = false;
                btnDetener.disabled = true;
            };

            recognition.onerror = (event) => {
                estado.innerText = "Error: " + event.error;
                console.error(event.error);
            };

            // Botones
            btnEscuchar.onclick = () => {
                textoFinal.value = "";
                recognition.start();
                btnEscuchar.disabled = true;
                btnDetener.disabled = false;
            };

            btnDetener.onclick = () => {
                recognition.stop();
            };
        }
    </script>
</body>
</html>
